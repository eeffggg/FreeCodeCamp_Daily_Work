<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Availability Table</title>
  </head>

  <body>
    <table>
      <tr>
        <th>Time/Week</th>
        <th>Monday</th>
        <th>Tuesday</th>
        <th>Wednesday</th>
        <th>Thursday</th>
        <th>Friday</th>
      </tr>
      <tr class="sharp">
        <th class="time"><time>9:00-10:00</time></th>
        <td class="available-1"></td>
        <td class="available-2"></td>
        <td class="available-3"></td>
        <td class="available-4"></td>
        <td class="available-5"></td>
      </tr>
      <tr class="sharp">
        <th class="time"><time>10:00-11:00</time></th>
        <td class="available-1"></td>
        <td class="available-4"></td>
        <td class="available-4"></td>
        <td class="available-4"></td>
        <td class="available-3"></td>
      </tr>
      <tr class="half">
        <th class="time"><time>11:00-12:00</time></th>

        <td class="available-3"></td>
        <td class="available-3"></td>
        <td class="available-1"></td>
        <td class="available-1"></td>
        <td class="available-5"></td>
      </tr>
      <tr class="half">
        <th class="time">2:00-3:00</th>
        <td class="available-2"></td>
        <td class="available-2"></td>
        <td class="available-0"></td>
        <td class="available-5"></td>
        <td class="available-0"></td>
      </tr>
      <tr class="sharp">
        <th class="time">3:00-4:00</th>
        <td class="available-2"></td>
        <td class="available-2"></td>
        <td class="available-1"></td>
        <td class="available-4"></td>
        <td class="available-5"></td>
      </tr>
    </table>
    <div id="legend">
      <span class="">Availability<br></span>
      <p>5</p>
      <div id="legend-gradient"></div>
      <p>0</p>
    </div>
  </body>
</html>

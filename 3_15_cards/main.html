<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Playing Cards</title>
  </head>

  <body>
    <main id="playing-cards">
      <div class="card card1">
        <div class="left">
          <div class="left-inner">
            <p>9</p>
            <p>♦</p>
          </div>
        </div>
        <div class="middle" id="card-9-middle">
          <div>
            <p>♦</p>
            <p>♦</p>
            <p>♦</p>
            <p>♦</p>
          </div>
          <div>
            <p>♦</p>
          </div>
          <div>
            <p>♦</p>
            <p>♦</p>
            <p>♦</p>
            <p>♦</p>
          </div>
        </div>

        <div class="right">
          <div class="right-inner">
            <p>9</p>
            <p>♦</p>
          </div>
        </div>
      </div>

      <div class="card card2">
        <div class="left">
          <div class="left-inner">
            <p>A</p>
            <p>♠</p>
          </div>
        </div>

        <div class="middle" id="card-A-middle">
          <p>♠</p>
        </div>

        <div class="right">
          <div class="right-inner">
            <p>A</p>
            <p>♠</p>
          </div>
        </div>
      </div>

      <div class="card card3">
        <div class="left">
          <div class="left-inner">
            <p>K</p>
            <p>♠</p>
          </div>
        </div>

        <div class="middle" id="card-K-middle">
          <div class="middle-left">
            <p>♠</p>
          </div>
          <div class="middle-middle">
            <img
              src="https://pic1.zhimg.com/v2-7a6e81016a5c7d9f2846bc94cb912688_720w.jpg?source=172ae18b"
              alt="a picture of K"
            />
          </div>
          <div class="middle-right">
            <p>♠</p>
          </div>
        </div>

        <div class="right">
          <div class="right-inner">
            <p>K</p>
            <p>♠</p>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>

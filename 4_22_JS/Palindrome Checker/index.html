<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Palindrome Checker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <!-- 外部矢量图库,用于切换主题的效果 -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css"
  />

  <body>
    <h1>Is it a Palindrome?</h1>
    <hr />
    <div id="change-theme">
      <i class="bi bi-brightness-high" aria-label="brightness-theme" hidden></i>
      <!-- 亮色 -->
      <i class="bi bi-moon" aria-label="moon-theme"></i>
    </div>

    <div id="main-part">
      <label for="text-input">Please input a word(Max 20 Chars):</label>
      <input id="text-input" />
      <button id="check-btn">Check</button>
      <div id="result">RESULT SHOWN HERE</div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
